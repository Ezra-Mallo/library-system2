<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System | Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="logo-area">
                <img src="/images/logo.png" alt="Library Logo" class="logo" onerror="this.src='https://via.placeholder.com/50x50?text=Library'">
                <h1>📚 Library Management System</h1>
            </div>
            <p class="tagline">Centralized Control Panel</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalBooks">0</div>
                <div class="stat-label">Total Books</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalMembers">0</div>
                <div class="stat-label">Active Members</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="booksBorrowed">0</div>
                <div class="stat-label">Books Borrowed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="overdueBooks">0</div>
                <div class="stat-label">Overdue Books</div>
            </div>
        </div>

        <div class="action-grid">
            <a href="register.html" class="action-card">📝 Register Member</a>
            <a href="add-book.html" class="action-card">➕ Add Book</a>
            <a href="remove-book.html" class="action-card">❌ Remove Book</a>
            <a href="borrow.html" class="action-card">📖 Borrow Book</a>
            <a href="return.html" class="action-card">🔄 Return Book</a>
            <a href="search.html" class="action-card">🔍 Search Catalog</a>
            <a href="reserve.html" class="action-card">🔖 Reserve Book</a>
            <a href="update-book.html" class="action-card">✏️ Update Book</a>
            <a href="view-report.html" class="action-card">📊 View Report</a>
            <a href="manage-users.html" class="action-card">👥 Manage Users</a>
        </div>

        <div class="recent-section">
            <h3>Recently Added Books</h3>
            <ul id="recentBooksList"></ul>
        </div>
    </div>

    <script src="js/scripts.js"></script>
</body>
</html>
